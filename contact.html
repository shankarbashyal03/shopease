<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - ShopEase</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--primary:#2563eb;--primary-dark:#1d4ed8;--secondary:#f59e0b;--dark:#0f172a;--light:#f8fafc;--gray:#64748b;--gray-light:#e2e8f0;--success:#16a34a;--radius:12px;--radius-sm:8px;--shadow:0 4px 20px rgba(0,0,0,0.1);--transition:all 0.3s ease}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#f1f5f9;color:var(--dark);line-height:1.6}
        .header{background:var(--dark);padding:1rem 2rem;position:sticky;top:0;z-index:1000}
        .header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
        .logo{font-size:1.8rem;font-weight:800;color:white;text-decoration:none;display:flex;align-items:center;gap:0.5rem}
        .logo i{color:var(--secondary)}.logo span{color:var(--secondary)}
        .nav-links{display:flex;gap:1.5rem}.nav-link{color:white;text-decoration:none;font-weight:500;transition:var(--transition)}.nav-link:hover,.nav-link.active{color:var(--secondary)}
        .container{max-width:1000px;margin:2rem auto;padding:0 2rem}
        .page-hero{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);color:white;padding:3rem 2rem;text-align:center;border-radius:var(--radius);margin-bottom:2rem}.page-hero h1{font-size:2.5rem}
        .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem}
        .info-card{background:white;padding:1.5rem;border-radius:var(--radius);box-shadow:var(--shadow);display:flex;align-items:flex-start;gap:1rem;margin-bottom:1rem;transition:var(--transition)}.info-card:hover{transform:translateY(-3px)}
        .info-icon{width:50px;height:50px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:1.2rem;flex-shrink:0}
        .contact-form{background:white;padding:2rem;border-radius:var(--radius);box-shadow:var(--shadow)}
        .form-group{margin-bottom:1.2rem}.form-group label{display:block;margin-bottom:0.5rem;font-weight:500}
        .form-group input,.form-group textarea{width:100%;padding:0.8rem 1rem;border:2px solid var(--gray-light);border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:0.95rem;transition:var(--transition)}
        .form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--primary)}.form-group textarea{resize:vertical;min-height:120px}
        .submit-btn{width:100%;padding:1rem;background:var(--primary);color:white;border:none;border-radius:var(--radius-sm);font-size:1rem;font-weight:600;cursor:pointer;transition:var(--transition)}.submit-btn:hover{background:var(--primary-dark)}
        .success-message{background:var(--success);color:white;padding:1rem;border-radius:var(--radius-sm);text-align:center;margin-top:1rem;display:none}
        .footer{background:var(--dark);color:white;padding:2rem;text-align:center;margin-top:3rem}.footer a{color:var(--secondary);text-decoration:none}
        @media(max-width:768px){.contact-grid{grid-template-columns:1fr}.page-hero h1{font-size:1.8rem}}
    </style>
</head>
<body>
    <header class="header"><div class="header-inner"><a href="index.html" class="logo"><i class="fas fa-shopping-bag"></i>Shop<span>Ease</span></a><nav class="nav-links"><a href="index.html" class="nav-link">Home</a><a href="about.html" class="nav-link">About</a><a href="contact.html" class="nav-link active">Contact</a><a href="cart.html" class="nav-link"><i class="fas fa-shopping-cart"></i></a></nav></div></header>
    <div class="container">
        <div class="page-hero"><h1>Contact Us</h1><p>We'd love to hear from you!</p></div>
        <div class="contact-grid">
            <div>
                <div class="info-card"><div class="info-icon"><i class="fas fa-envelope"></i></div><div><h3>Email Us</h3><p>support@shopease.com</p></div></div>
                <div class="info-card"><div class="info-icon"><i class="fas fa-phone"></i></div><div><h3>Call Us</h3><p>+971 50 123 4567</p></div></div>
                <div class="info-card"><div class="info-icon"><i class="fas fa-map-marker-alt"></i></div><div><h3>Visit Us</h3><p>Dubai, United Arab Emirates</p></div></div>
            </div>
            <div class="contact-form">
                <h2 style="margin-bottom:1.5rem">Send a Message</h2>
                <form onsubmit="handleSubmit(event)">
                    <div class="form-group"><label>Full Name *</label><input type="text" id="name" required></div>
                    <div class="form-group"><label>Email *</label><input type="email" id="email" required></div>
                    <div class="form-group"><label>Message *</label><textarea id="message" required></textarea></div>
                    <button type="submit" class="submit-btn"><i class="fas fa-paper-plane"></i> Send Message</button>
                </form>
                <div class="success-message" id="successMsg"><i class="fas fa-check-circle"></i> Message sent successfully!</div>
            </div>
        </div>
    </div>
    <footer class="footer"><p>&copy; 2024 <a href="index.html">ShopEase</a>. UAE</p></footer>
    <script>
        function handleSubmit(e){e.preventDefault();document.getElementById('successMsg').style.display='block';e.target.reset();setTimeout(()=>document.getElementById('successMsg').style.display='none',5000)}
    </script>
</body>
</html>
