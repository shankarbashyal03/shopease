<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled - ShopEase</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--primary:#2563eb;--primary-dark:#1d4ed8;--dark:#0f172a;--gray:#64748b;--danger:#dc2626;--radius:12px;--shadow:0 20px 60px rgba(0,0,0,0.1);--transition:all 0.3s ease}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#fef2f2 0%,#fee2e2 50%,#fef2f2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
        .cancel-container{text-align:center;padding:3rem;background:white;border-radius:var(--radius);box-shadow:var(--shadow);max-width:500px;width:90%;animation:fadeInUp 0.6s ease}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        .cancel-circle{width:100px;height:100px;background:var(--danger);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 2rem}
        .cancel-x{color:white;font-size:3rem}h1{font-size:2rem;color:var(--dark);margin-bottom:0.5rem}
        .message{color:var(--gray);line-height:1.6;margin-bottom:2rem}
        .button-group{display:flex;gap:1rem;justify-content:center}
        .btn{display:inline-block;padding:1rem 2rem;border:none;border-radius:50px;font-weight:600;font-size:1rem;cursor:pointer;text-decoration:none;transition:var(--transition);font-family:'Inter',sans-serif}
        .btn-primary{background:var(--primary);color:white}.btn-primary:hover{background:var(--primary-dark);transform:translateY(-2px)}
        .btn-outline{background:transparent;color:var(--dark);border:2px solid var(--gray)}.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
        @media(max-width:480px){.button-group{flex-direction:column}}
    </style>
</head>
<body>
    <div class="cancel-container">
        <div class="cancel-circle"><i class="fas fa-times cancel-x"></i></div>
        <h1>Payment Cancelled</h1>
        <p class="message">Your payment was not completed. Your cart is still saved. No charges have been made.</p>
        <div class="button-group"><a href="cart.html" class="btn btn-primary"><i class="fas fa-shopping-cart"></i> Return to Cart</a><a href="index.html" class="btn btn-outline"><i class="fas fa-shopping-bag"></i> Continue Shopping</a></div>
    </div>
</body>
</html>
